<section id="top" class="nl-hero" aria-label="Presentazione NOLEGGIA-LO">
  <div class="nl-hero__bg" aria-hidden="true"></div>

  <div class="nl-hero__grid">

    <!-- Testo -->
    <div class="nl-hero__text">
      <div class="nl-badge nl-fade-up" aria-label="Stato operativo">
        <span class="nl-badge__dot" aria-hidden="true"></span>
        Siamo operativi · Apertura imminente
      </div>

      <h1 class="nl-fade-up">
        Noleggia il tuo<br />
        <span class="accent">furgone cargo</span> a Chieti.
      </h1>

      <p class="nl-hero__desc nl-fade-up">
        Furgoni cargo disponibili a Brecciarola di Chieti. Pratici, affidabili, pronti quando serve.
      </p>

      <div class="nl-hero__ctas nl-fade-up">
        <a href="{{ .Site.Params.tel | safeURL }}" class="nl-btn nl-btn--orange nl-btn--lg">
          📞 Chiama ora — {{ .Site.Params.phone }}
        </a>
        <a href="#furgoni" class="nl-btn nl-btn--outline-white nl-btn--lg">
          Scopri i furgoni →
        </a>
      </div>
    </div>

    <!-- Immagine -->
    <div class="nl-hero__img-wrap nl-fade-up">
      <div class="nl-hero__img-glow" aria-hidden="true"></div>
      <div class="nl-hero__img-card">
        <img
          src="/images/Furgone-piazzale.png"
          alt="Furgone cargo NOLEGGIA-LO parcheggiato in piazzale — VW Crafter brandizzato"
          loading="eager"
          width="960"
          height="640"
        />
      </div>
    </div>

  </div>
</section>
