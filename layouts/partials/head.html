<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

{{- $title := cond .IsHome .Site.Title (printf "%s | %s" .Title .Site.Title) -}}
<title>{{ $title }}</title>

{{- $desc := .Description | default .Site.Params.description -}}
<meta name="description" content="{{ $desc }}" />

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}" />

<!-- Open Graph -->
<meta property="og:type"        content="website" />
<meta property="og:url"         content="{{ .Permalink }}" />
<meta property="og:title"       content="{{ $title }}" />
<meta property="og:description" content="{{ $desc }}" />
<meta property="og:image"       content="{{ absURL .Site.Params.ogImage }}" />
<meta property="og:locale"      content="it_IT" />

<!-- Twitter / X Card -->
<meta name="twitter:card"        content="summary_large_image" />
<meta name="twitter:title"       content="{{ $title }}" />
<meta name="twitter:description" content="{{ $desc }}" />
<meta name="twitter:image"       content="{{ absURL .Site.Params.ogImage }}" />

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

<!-- Google Fonts (Sansita logo · Syne headings · Inter body) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Sansita:ital,wght@1,900&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>

<!-- Stylesheet (fingerprinted via Hugo Pipes) -->
{{- $css := resources.Get "css/main.css" | fingerprint -}}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" />
